<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Isopod Slideshow</title>

    <link rel="stylesheet" href="./main.css">
</head>

<body>
    <main class="slideshow-card">
        <h1>Isopod Slideshow</h1>

        <div class="slideshow">
            <img
                id="isopodImage"
                src="./images/dairy-cow.jpg"
                alt="Dairy Cow Isopod"
            >

            <h2 id="isopodName">Dairy Cow Isopod</h2>

            <p id="isopodDescription">
                Dairy Cow isopods have bold black-and-white markings.
            </p>

            <div class="button-row">
                <button id="previousButton" type="button">
                    Previous
                </button>

                <button id="nextButton" type="button">
                    Next
                </button>
            </div>
        </div>

        <a class="back-button" href="../index.html">
            Back to Assignments
        </a>
    </main>

    <script src="./slideshow.js?v=2"></script>
</body>
</html>
