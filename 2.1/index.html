<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Isopod Slideshow</title>

    <link rel="stylesheet" href="main.css">
</head>

<body>
    <main class="slideshow-card">
        <h1>Isopod Slideshow</h1>

        <div class="slideshow">
            <img id="isopodImage" src="" alt="Isopod slideshow image">

            <h2 id="isopodName"></h2>

            <p id="isopodDescription"></p>

            <div class="button-row">
                <button id="previousButton" type="button">
                    Previous
                </button>

                <button id="nextButton" type="button">
                    Next
                </button>
            </div>
        </div>

        <a class="back-button" href="../index.html">
            Back to Assignments
        </a>
    </main>

    <script src="slideshow.js"></script>
</body>
</html>
