<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSC256 Assignments</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #dbeafe;
            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        main {
            width: 90%;
            max-width: 600px;
            padding: 30px;

            background-color: white;
            border: 3px solid #2563eb;
            border-radius: 12px;

            text-align: center;
            box-shadow: 0 6px 16px rgba(30, 64, 175, 0.2);
        }

        h1 {
            color: #1e3a8a;
            margin-top: 0;
        }

        p {
            color: #1e40af;
            font-size: 18px;
        }

        .assignment-button {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 12px;

            background-color: #2563eb;
            color: white;

            text-decoration: none;
            border: 2px solid #1d4ed8;
            border-radius: 6px;
        }

        .assignment-button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>

<body>
    <main>
        <h1>CSC256 Assignments</h1>

        <p>Select an assignment below.</p>

        <a class="assignment-button" href="1.2/">
            Assignment 1.2
        </a>
        <a class="assignment-button" href="2.1/">
            Assignment 2.1
        </a>
    </main>
</body>
</html>
